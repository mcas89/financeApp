<style>
    .vault-card {
        background: var(--surface-color);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1rem;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-md);
        position: relative;
        overflow: hidden;
    }
    .vault-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 6px; height: 100%;
        background-color: var(--vault-color, var(--primary));
    }
    .vault-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1rem;
    }
    .vault-icon-box {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: rgba(139, 92, 246, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: var(--vault-color, var(--primary));
    }
    .vault-progress-bar {
        width: 100%;
        height: 8px;
        background: var(--border-color);
        border-radius: 4px;
        overflow: hidden;
        margin: 1rem 0;
    }
    .vault-progress-fill {
        height: 100%;
        background: var(--vault-color, var(--primary));
        border-radius: 4px;
        transition: width 0.5s ease;
    }
    .vault-actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
    }
    .vault-btn {
        flex: 1;
        padding: 0.75rem;
        border-radius: var(--radius-md);
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
    }
    .btn-deposit { background: var(--success-bg); color: var(--success); }
    .btn-withdraw { background: var(--danger-bg); color: var(--danger); }
</style>

<div class="app-shell page-enter scrollable-area">
    <!-- Top Bar -->
    <header class="top-app-bar">
        <button class="icon-btn" onclick="navigation.go('/dashboard')"><i class="fas fa-arrow-left"></i></button>
        <h1 class="title">Meus Cofres</h1>
        <div style="width: 48px;"></div> <!-- spacer -->
    </header>

    <main class="main-content" style="padding-top: 1.5rem;">
        <div id="vaults-list">
            <div class="initial-loader" id="vaults-loader" style="height: 50vh;">
                <div class="spinner"></div>
            </div>
            <!-- Cofres serão injetados aqui -->
        </div>
    </main>

    <!-- FAB -->
    <div class="fab" onclick="document.getElementById('new-vault-modal').showModal()">
        <i class="fas fa-plus"></i>
    </div>
</div>

<!-- Modal: Novo Cofre -->
<dialog id="new-vault-modal" style="width: 90%; max-width: 400px; border: none; border-radius: var(--radius-lg); background: var(--surface-color); color: var(--text-primary); padding: 1.5rem; box-shadow: var(--shadow-lg);">
    <h2 style="margin-bottom: 1.5rem;" id="nv-title">Novo Cofre</h2>
    <form id="new-vault-form">
        <input type="hidden" id="nv-id" value="">
        <div class="input-group">
            <label>Nome do Objetivo</label>
            <input type="text" id="nv-name" required placeholder="Ex: Viagem para Paris">
        </div>
        <div class="input-group">
            <label>Meta (R$)</label>
            <input type="number" id="nv-target" step="0.01" required placeholder="10000">
        </div>
        <div class="input-group">
            <label>Cor</label>
            <input type="color" id="nv-color" value="#8b5cf6" style="padding: 0; border: none; height: 40px;">
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="button" class="btn" style="flex: 1; background: var(--bg-color);" onclick="document.getElementById('new-vault-modal').close()">Cancelar</button>
            <button type="submit" class="btn btn-primary" style="flex: 1;">Criar Cofre</button>
        </div>
    </form>
</dialog>

<!-- Modal: Movimentar Cofre -->
<dialog id="transfer-vault-modal" style="width: 90%; max-width: 400px; border: none; border-radius: var(--radius-lg); background: var(--surface-color); color: var(--text-primary); padding: 1.5rem; box-shadow: var(--shadow-lg);">
    <h2 id="tv-title" style="margin-bottom: 0.5rem;">Guardar Dinheiro</h2>
    <p id="tv-desc" style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;"></p>
    
    <form id="transfer-vault-form">
        <input type="hidden" id="tv-vault-id">
        <input type="hidden" id="tv-type"> <!-- 'deposit' ou 'withdraw' -->
        
        <div class="input-group">
            <label>Valor (R$)</label>
            <input type="number" id="tv-amount" step="0.01" required placeholder="0,00" min="0.01">
        </div>
        
        <div class="input-group">
            <label>Conta Origem/Destino</label>
            <select id="tv-wallet" required style="width: 100%; height: var(--touch-target); padding: 0 1.25rem; background: var(--bg-color); color: var(--text-primary); border: 1.5px solid var(--border-color); border-radius: var(--radius-md);">
                <!-- Preenchido pelo js -->
            </select>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="button" class="btn" style="flex: 1; background: var(--bg-color);" onclick="document.getElementById('transfer-vault-modal').close()">Cancelar</button>
            <button type="submit" class="btn btn-primary" style="flex: 1;" id="tv-submit">Confirmar</button>
        </div>
    </form>
</dialog>
