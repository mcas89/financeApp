<style>
    /* Profile Premium UI */
    .profile-hero {
        text-align: center;
        padding: 2rem 1rem 2rem;
        background: linear-gradient(180deg, var(--primary-light) 0%, transparent 100%);
        border-radius: 0 0 var(--radius-xl) var(--radius-xl);
        margin: -1.5rem -1.5rem 2.5rem -1.5rem;
    }

    .profile-avatar-container {
        position: relative;
        width: 110px;
        height: 110px;
        margin: 0 auto 1.5rem;
    }

    .profile-avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), #a855f7);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
        border: 4px solid var(--surface-color);
        position: relative;
        z-index: 2;
    }

    .profile-avatar-glow {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 50%;
        background: var(--primary);
        filter: blur(20px);
        opacity: 0.6;
        z-index: 1;
        animation: pulseAvatar 3s infinite ease-in-out;
    }

    @keyframes pulseAvatar {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.15); opacity: 0.3; }
    }

    .profile-name-title {
        font-size: 1.6rem;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        margin-bottom: 0.25rem;
    }

    .profile-email-subtitle {
        font-size: 0.95rem;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .profile-card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 2rem;
        box-shadow: var(--shadow-sm);
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
    }

    .profile-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 4px; height: 100%;
        background: var(--primary);
        border-radius: 4px 0 0 4px;
    }

    .profile-card.danger::before {
        background: var(--danger);
    }

    .profile-section-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .premium-input-group {
        position: relative;
        margin-bottom: 1.75rem;
    }

    .premium-input-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .premium-input {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1.05rem;
        font-weight: 500;
        color: var(--text-primary);
        background: var(--bg-color);
        border: 2px solid transparent;
        border-radius: var(--radius-md);
        transition: all 0.3s ease;
        outline: none;
        font-family: 'Inter', sans-serif;
    }

    .premium-input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
        background: var(--surface-color);
    }

    .premium-input:disabled {
        background: rgba(0,0,0,0.03);
        color: var(--text-secondary);
        cursor: not-allowed;
        border-color: transparent;
        font-weight: 400;
    }

    .btn-save {
        width: 100%;
        padding: 1rem;
        font-size: 1.05rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--primary-hover));
        color: white;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-save:active {
        transform: scale(0.98);
        box-shadow: 0 2px 6px rgba(124, 58, 237, 0.2);
    }

    .danger-box {
        background: var(--danger-bg);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        margin-top: 1rem;
    }

    .btn-delete {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 700;
        background: white;
        color: var(--danger);
        border: 2px solid var(--danger);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-delete:hover, .btn-delete:active {
        background: var(--danger);
        color: white;
    }
</style>

<div class="app-shell page-enter scrollable-area">
    <header class="top-app-bar" style="background: transparent; border: none; box-shadow: none;">
        <button class="icon-btn" onclick="navigation.go('/dashboard')" style="background: var(--surface-color); box-shadow: var(--shadow-sm);"><i class="fas fa-arrow-left"></i></button>
        <div style="width: 48px;"></div>
    </header>

    <main class="main-content" style="padding-top: 0; max-width: 600px; margin: 0 auto;">
        
        <div class="profile-hero">
            <div class="profile-avatar-container">
                <div class="profile-avatar-glow"></div>
                <div class="profile-avatar">
                    <i class="fas fa-user-astronaut"></i>
                </div>
            </div>
            <h2 id="profile-display-name" class="profile-name-title">Carregando...</h2>
            <p id="profile-display-email" class="profile-email-subtitle">...</p>
        </div>

        <div class="profile-card">
            <h3 class="profile-section-title"><i class="fas fa-id-badge" style="color: var(--primary);"></i> Dados Pessoais</h3>
            
            <form id="profile-form">
                <div class="premium-input-group">
                    <label for="profile-name">Nome de Exibição</label>
                    <input type="text" id="profile-name" class="premium-input" placeholder="Como devemos chamar você?" required>
                </div>
                
                <div class="premium-input-group">
                    <label for="profile-email">Email (Acesso)</label>
                    <input type="email" id="profile-email" class="premium-input" disabled>
                </div>
                
                <button type="submit" class="btn-save"><i class="fas fa-check-circle"></i> Salvar Alterações</button>
            </form>
        </div>

        <!-- Danger Zone -->
        <div class="profile-card danger" style="background: rgba(239, 68, 68, 0.02); border-color: rgba(239, 68, 68, 0.2);">
            <h3 class="profile-section-title" style="color: var(--danger);"><i class="fas fa-shield-alt"></i> Zona de Perigo</h3>
            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.5;">
                A exclusão da conta apaga definitivamente todas as suas transações, carteiras, metas e configurações. <br><strong>Esta ação não tem volta.</strong>
            </p>
            <button id="btn-delete-account-intent" class="btn-delete"><i class="fas fa-trash-alt" style="margin-right: 0.5rem;"></i> Excluir minha conta</button>
        </div>

    </main>

    <!-- Modal Re-Autenticação e Exclusão -->
    <dialog id="delete-account-modal" style="width: 85%; max-width: 350px; border: none; border-radius: var(--radius-lg); background: var(--surface-color); color: var(--text-primary); padding: 1.5rem; box-shadow: var(--shadow-lg); text-align: center; overflow: visible;">
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; backdrop-filter: blur(10px); border-radius: var(--radius-lg);"></div>
        
        <div style="margin-bottom: 1rem;">
            <i class="fas fa-user-times" style="font-size: 2.5rem; color: var(--danger);"></i>
        </div>
        
        <h3 style="margin-bottom: 0.5rem; font-size: 1.2rem; font-weight: 600;">Exclusão Permanente</h3>
        <p style="margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5;">
            Para garantir sua segurança, por favor, insira sua senha atual para deletar sua conta.
        </p>
        
        <form id="delete-account-form">
            <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                <input type="password" id="delete-password" class="form-input" placeholder="Sua senha" required style="text-align: center;">
            </div>
            
            <div style="display: flex; gap: 0.75rem;">
                <button type="button" class="btn" onclick="document.getElementById('delete-account-modal').close()" style="flex: 1; background: var(--bg-color); color: var(--text-primary);">Cancelar</button>
                <button type="submit" id="btn-confirm-delete" class="btn" style="flex: 1; background: var(--danger); color: white;">Excluir Conta</button>
            </div>
        </form>
    </dialog>
</div>
