<style>
    .credit-card-premium {
        border-radius: 16px;
        padding: 1.5rem;
        color: white;
        margin-bottom: 1.5rem;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        position: relative;
        overflow: hidden;
    }
    .credit-card-premium::before {
        content: '';
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
    }
    .cc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .cc-name { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .cc-brand { font-size: 1.8rem; }
    .cc-invoice-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 0.25rem; }
    .cc-invoice-value { font-size: 2.2rem; font-weight: 800; font-family: var(--font-display); letter-spacing: -1px; margin-bottom: 1.5rem; }
    .cc-limit-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: 500; }
    .cc-progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
    .cc-progress-fill { height: 100%; transition: width 0.5s ease; }
    
    .color-option { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: inline-block; border: 2px solid transparent; }
    .color-option.selected { border-color: white; outline: 2px solid var(--primary); }
</style>

<div class="app-shell">
    <header class="top-bar">
        <button class="icon-btn" onclick="navigation.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="page-title">Cartões de Crédito</h1>
        <button class="icon-btn" id="btn-new-card">
            <i class="fas fa-plus"></i>
        </button>
    </header>

    <main class="content-area" style="padding: 1rem;">
        <div id="cards-list">
            <div style="text-align:center; padding: 2rem;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary)"></i>
            </div>
        </div>

        <div id="card-form-container" style="display: none; background: var(--surface-color); padding: 1.5rem; border-radius: var(--radius-lg); margin-top: 1rem; border: 1px solid var(--border-color);">
            <h3 style="margin-bottom: 1rem;" id="cc-form-title">Novo Cartão</h3>
            <input type="hidden" id="cc-id" value="">
            
            <div class="input-group">
                <label>Nome do Cartão</label>
                <input type="text" id="cc-name" placeholder="Ex: Nubank Ultravioleta, Itaú Black..." style="width: 100%; padding: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
            </div>

            <div class="input-group">
                <label>Limite do Cartão</label>
                <input type="number" id="cc-limit" placeholder="R$ 5000,00" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
            </div>
            
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <div class="input-group" style="flex: 1; min-width: 120px;">
                    <label>Dia de Fechamento</label>
                    <input type="number" id="cc-closing" placeholder="Ex: 25" min="1" max="31" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
                </div>
                <div class="input-group" style="flex: 1; min-width: 120px;">
                    <label>Dia de Vencimento</label>
                    <input type="number" id="cc-due" placeholder="Ex: 5" min="1" max="31" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
                </div>
            </div>

            <div class="input-group" style="margin-top: 1rem;">
                <label>Compras no dia do fechamento caem na fatura:</label>
                <select id="cc-closing-rule" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary);">
                    <option value="next">Próxima Fatura (Padrão)</option>
                    <option value="current">Fatura Atual</option>
                </select>
            </div>

            <div class="input-group" style="margin-top: 1rem;">
                <label>Cor do Cartão</label>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;" id="cc-color-selector">
                    <div class="color-option selected" data-value="#8b5cf6" style="background: #8b5cf6;"></div>
                    <div class="color-option" data-value="#252525" style="background: #252525;"></div> <!-- Black -->
                    <div class="color-option" data-value="#ea580c" style="background: #ea580c;"></div> <!-- Laranja Inter -->
                    <div class="color-option" data-value="#dc2626" style="background: #dc2626;"></div> <!-- Vermelho Bradesco -->
                    <div class="color-option" data-value="#ca8a04" style="background: #ca8a04;"></div> <!-- Gold -->
                    <div class="color-option" data-value="#1d4ed8" style="background: #1d4ed8;"></div> <!-- Azul -->
                </div>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap;">
                <button class="btn" style="flex: 1; min-width: 120px; background: transparent; border: 1px solid var(--border-color); color: var(--text-primary);" id="btn-cancel-card">Cancelar</button>
                <button class="btn btn-primary" style="flex: 1; min-width: 120px;" id="btn-save-card">Salvar</button>
            </div>
        </div>
    </main>
</div>
