<style>
    .auth-page {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background-color: var(--bg-color);
        padding: 0.5rem 1.5rem 2rem;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--surface-color);
        color: var(--text-primary);
        font-size: 1.25rem;
        box-shadow: var(--shadow-sm);
        margin-bottom: 0.5rem;
        transition: transform 0.2s, background 0.2s;
    }

    .back-btn:active {
        transform: scale(0.9);
        background: var(--bg-color);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 1rem;
        animation: slideUp 0.5s ease;
    }

    .auth-header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
    }

    .auth-header p {
        color: var(--text-secondary);
        font-size: 1.1rem;
    }

    .auth-card {
        background: var(--surface-color);
        border-radius: var(--radius-lg);
        padding: 2rem 1.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border-color);
        animation: slideUp 0.6s ease;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 1.5rem;
    }

    .input-wrapper label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--text-secondary);
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .input-icon-box {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-icon-box i.left-icon {
        position: absolute;
        left: 1rem;
        color: var(--text-secondary);
        font-size: 1.1rem;
    }

    .input-icon-box input {
        width: 100%;
        height: 56px;
        background: var(--bg-color);
        border: 1.5px solid transparent;
        border-radius: var(--radius-md);
        padding: 0 1rem 0 3rem; /* Espaço para o ícone esquerdo */
        font-size: 1.05rem;
        color: var(--text-primary);
        font-weight: 500;
        transition: all 0.2s;
    }

    /* Padding extra para o olhinho na direita */
    .input-icon-box input.has-eye {
        padding-right: 3rem;
    }

    .input-icon-box input:focus {
        outline: none;
        background: var(--surface-color);
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-light);
    }

    .eye-btn {
        position: absolute;
        right: 0.5rem;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 1.2rem;
        background: transparent;
        border: none;
        cursor: pointer;
    }

    .eye-btn:active {
        color: var(--primary);
    }

    .error-msg {
        display: none;
        color: var(--danger);
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 0.5rem;
        padding-left: 0.5rem;
    }

    .input-wrapper.invalid input {
        border-color: var(--danger);
        background: var(--danger-bg);
    }

    .input-wrapper.invalid .error-msg {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    .auth-submit-area {
        margin-top: auto;
        padding-top: 2rem;
    }

</style>

<div class="auth-page">
    <a href="/welcome" data-link class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="auth-header">
        <h1>Criar Conta</h1>
        <p>Junte-se a nós e simplifique sua vida.</p>
    </div>
    
    <div class="auth-card">
        <form id="register-form" style="display: flex; flex-direction: column; flex: 1;">
            
            <div class="input-wrapper">
                <label>Nome completo</label>
                <div class="input-icon-box">
                    <i class="fas fa-user left-icon"></i>
                    <input type="text" id="reg-name" required placeholder="Como devemos chamar você?">
                </div>
            </div>
            
            <div class="input-wrapper" id="email-group">
                <label>E-mail</label>
                <div class="input-icon-box">
                    <i class="fas fa-envelope left-icon"></i>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <span class="error-msg"><i class="fas fa-exclamation-circle"></i> Formato inválido.</span>
            </div>
            
            <div class="input-wrapper" id="password-group">
                <label>Senha</label>
                <div class="input-icon-box">
                    <i class="fas fa-lock left-icon"></i>
                    <input type="password" id="reg-password" class="has-eye" required placeholder="Mínimo 6 caracteres">
                    <button type="button" class="eye-btn" data-target="reg-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-msg"><i class="fas fa-exclamation-circle"></i> Mínimo de 6 caracteres.</span>
            </div>
            
            <div class="input-wrapper" id="confirm-password-group">
                <label>Confirmar senha</label>
                <div class="input-icon-box">
                    <i class="fas fa-check-circle left-icon"></i>
                    <input type="password" id="reg-confirm-password" class="has-eye" required placeholder="Repita sua senha">
                    <button type="button" class="eye-btn" data-target="reg-confirm-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <span class="error-msg"><i class="fas fa-exclamation-circle"></i> As senhas não coincidem.</span>
            </div>
            
            <div class="auth-submit-area">
                <button type="submit" class="btn btn-primary" style="width: 100%; height: 56px; font-size: 1.1rem;">Criar conta</button>
            </div>
        </form>
    </div>
</div>
