<div class="welcome-container" style="display: flex; flex-direction: column; height: 100vh; background: var(--bg-color); position: relative; overflow: hidden;">
    
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem;">
        <img src="./financeAppLogo.png" alt="Logo" style="width: 160px; height: auto; animation: slideUp 0.5s ease; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05));">
    </div>
    
    <!-- Metade inferior: Textos e Botões -->
    <div style="display: flex; flex-direction: column; text-align: center; animation: fadeIn 1s ease; width: 100%; max-width: 400px; margin: 0 auto;">
        
        <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; color: var(--text-primary); font-weight: 800; line-height: 1.15; letter-spacing: -0.5px;">
            Controle total,<br>zero esforço
        </h1>
        
        <p style="color: var(--text-secondary); font-size: 1.15rem; line-height: 1.5; margin-bottom: 3rem; font-weight: 500;">
            Seu assistente financeiro
        </p>
        
        <div style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: env(safe-area-inset-bottom, 1rem);">
            <a href="/register" data-link class="btn btn-primary" style="height: 56px; font-size: 1.1rem;">Começar agora</a>
            <a href="/login" data-link class="btn" style="height: 56px; background-color: var(--surface-color); border: 2px solid var(--border-color); color: var(--text-primary); font-size: 1.1rem; box-shadow: var(--shadow-sm);">Já tenho conta</a>
        </div>
    </div>
</div>
