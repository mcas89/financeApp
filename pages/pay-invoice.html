<style>
    /* Bottom Sheets */
    .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        right: 0;
        background: var(--surface-color);
        border-top-left-radius: var(--radius-lg);
        border-top-right-radius: var(--radius-lg);
        z-index: 1000;
        padding: 1.5rem;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 85vh;
        overflow-y: auto;
    }
    .bottom-sheet.open { bottom: 0; }
    
    .sheet-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); z-index: 999; display: none; backdrop-filter: blur(2px);
    }
    .sheet-overlay.open { display: block; }
    
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .sheet-title { font-size: 1.1rem; font-weight: 700; }

    .selector-box {
        width: 100%; min-height: 56px; background: var(--surface-color); border: 1px solid var(--border-color);
        border-radius: var(--radius-md); padding: 0.75rem 1rem 0.75rem 3.25rem; font-size: 1.05rem; font-weight: 500;
        color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    }

    .sheet-item {
        padding: 1rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem; cursor: pointer;
    }
    .sheet-item:last-child { border-bottom: none; }
    .sheet-item:active { background: var(--bg-color); }
    .sheet-item-icon { width: 40px; height: 40px; border-radius: 12px; background: rgba(139, 92, 246, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
</style>

<div class="app-shell page-enter" style="background-color: var(--bg-color); min-height: 100vh;">
    <header class="top-bar" style="background: transparent; border: none;">
        <button class="icon-btn" onclick="navigation.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1 class="page-title">Pagar Fatura</h1>
        <div style="width: 48px;"></div>
    </header>

    <main class="main-content">
        <div style="background: var(--surface-color); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <div>
                    <div style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.25rem;">Valor a Pagar</div>
                    <div id="invoice-card-name" style="color: var(--primary); font-weight: 600; font-size: 0.9rem;">Fatura Vigente</div>
                </div>
                <button type="button" id="btn-pay-full" style="background: rgba(139, 92, 246, 0.1); color: var(--primary); border: none; padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: background 0.2s;">
                    Pagar Total
                </button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 0.5rem; background: var(--bg-color); padding: 0.75rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                <span style="font-size: 1.25rem; font-weight: 600; color: var(--text-secondary);">R$</span>
                <input type="number" step="0.01" id="pay-amount" style="font-size: 1.75rem; font-weight: 700; font-family: var(--font-display); color: var(--text-primary); background: transparent; border: none; width: 100%; outline: none;" value="0.00" placeholder="0.00">
            </div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.75rem; text-align: center; font-weight: 500;">
                <i class="fas fa-edit" style="margin-right: 4px;"></i> Edite o valor acima para pagamento parcial
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase;">Cartão de Crédito (Para Pagar)</label>
            <div style="position: relative;">
                <i class="fas fa-credit-card" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); z-index: 2;"></i>
                <div class="selector-box" onclick="document.getElementById('sheet-cards').classList.add('open'); document.getElementById('sheet-overlay').classList.add('open');">
                    <span id="display-dest-card">Selecione o cartão...</span>
                    <i class="fas fa-chevron-down" style="color: var(--text-secondary); font-size: 0.9rem;"></i>
                </div>
                <input type="hidden" id="pay-dest-card">
            </div>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase;">Conta de Origem (Para Débito)</label>
            <div style="position: relative;">
                <i class="fas fa-landmark" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); z-index: 2;"></i>
                <div class="selector-box" onclick="document.getElementById('sheet-wallets').classList.add('open'); document.getElementById('sheet-overlay').classList.add('open');">
                    <span id="display-source-wallet">Selecione a conta...</span>
                    <i class="fas fa-chevron-down" style="color: var(--text-secondary); font-size: 0.9rem;"></i>
                </div>
                <input type="hidden" id="pay-source-wallet">
            </div>
        </div>

        <button id="btn-confirm-payment" style="width: 100%; height: 60px; border-radius: var(--radius-full); background: linear-gradient(135deg, var(--primary), #a855f7); color: white; font-size: 1.15rem; font-weight: 700; border: none; box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4); display: flex; align-items: center; justify-content: center; gap: 0.75rem; transition: transform 0.2s;">
            <i class="fas fa-check-circle"></i> Confirmar Pagamento
        </button>
    </main>

    <!-- Overlay -->
    <div class="sheet-overlay" id="sheet-overlay" onclick="document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('open')); this.classList.remove('open');"></div>

    <!-- Sheet Cartões -->
    <div class="bottom-sheet" id="sheet-cards">
        <div class="sheet-header">
            <div class="sheet-title">Selecione o Cartão</div>
            <i class="fas fa-times" onclick="document.getElementById('sheet-cards').classList.remove('open'); document.getElementById('sheet-overlay').classList.remove('open');" style="cursor:pointer; font-size: 1.25rem; color: var(--text-secondary);"></i>
        </div>
        <div id="cards-list-container">
            <!-- Injetado via JS -->
        </div>
    </div>

    <!-- Sheet Contas -->
    <div class="bottom-sheet" id="sheet-wallets">
        <div class="sheet-header">
            <div class="sheet-title">Conta de Origem</div>
            <i class="fas fa-times" onclick="document.getElementById('sheet-wallets').classList.remove('open'); document.getElementById('sheet-overlay').classList.remove('open');" style="cursor:pointer; font-size: 1.25rem; color: var(--text-secondary);"></i>
        </div>
        <div id="wallets-list-container">
            <!-- Injetado via JS -->
        </div>
    </div>
</div>
